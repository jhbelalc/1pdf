name: .NET Build & Release

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    name: Build & Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests (if exist)
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Publish self-contained EXE
      run: >
        dotnet publish 1pdf/1pdf.csproj
        --configuration Release
        --runtime win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:DebugType=none
        --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 1pdf-release
        path: ./publish/1pdf.exe
        retention-days: 5

  create-release:
    needs: build
    runs-on: windows-latest
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: 1pdf-release
        path: ./artifacts

    - name: Get version from tag
      id: get_version
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/1pdf.exe
        draft: false
        prerelease: false
        body: |
          ## 1PDF ${{ steps.get_version.outputs.VERSION }}

          ### 📥 Installation
          1. Download `1pdf.exe` below
          2. Double-click to run — no installation needed

          **Requirements:**
          - Windows 10 or later
          - No additional dependencies (runtime is bundled)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}